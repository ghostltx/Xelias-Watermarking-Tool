<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Source+Sans+3:wght@400;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet" />
  <style>
    :root{
      --bg:#f4f5fb;
      --panel:#f8f8fc;
      --line:rgba(26, 36, 64, .10);
      --ink:#12213d;
      --muted:#6b7280;
      --blue:#1764d4;
      --shadow:0 18px 52px rgba(20, 30, 52, .11);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:'Inter','Roboto','Source Sans 3','Manrope','Noto Sans SC',sans-serif;
      color:var(--ink);
      background:#1f2127;
      overflow:hidden;
    }
    .shell{
      width:100vw;
      height:100vh;
      display:flex;
      flex-direction:column;
      background:linear-gradient(180deg,#ffffff,#f4f5fb 100%);
    }
    .topbar{
      height:54px;
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 16px 0 18px;
      background:rgba(255,255,255,.86);
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(14px);
    }
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:14px}
    .brand-badge{
      width:26px;height:26px;border-radius:8px;
      display:grid;place-items:center;
      background:linear-gradient(135deg,var(--blue),#0a84ff);
      color:#fff;
      box-shadow:0 8px 16px rgba(23,100,212,.25);
    }
    .actions{display:flex;align-items:center;gap:10px}
    .btn{
      height:34px;border:0;border-radius:8px;padding:0 12px;
      font-weight:700;font-size:12px;cursor:pointer;
      background:#eef2ff;color:#0f172a;
    }
    .btn-primary{
      background:linear-gradient(135deg,var(--blue),#0b63e6);
      color:#fff;
      box-shadow:0 8px 18px rgba(23,100,212,.28);
    }
    .content{
      flex:1;
      min-height:0;
      display:grid;
      grid-template-columns:214px 1fr 246px;
      background:#f6f7fb;
    }
    .sidebar,.properties{
      min-height:0;
      display:flex;
      flex-direction:column;
      background:var(--panel);
    }
    .sidebar{border-right:1px solid var(--line)}
    .properties{border-left:1px solid var(--line)}
    .head{
      height:52px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 14px;
      border-bottom:1px solid var(--line);
      font-size:12px;
      font-weight:800;
      color:#334155;
    }
    .body{
      min-height:0;
      overflow:auto;
      padding:12px;
    }
    .section-title{
      margin:14px 0 8px;color:#64748b;font-size:10px;font-weight:800;letter-spacing:.12em;
    }
    .template-item{
      height:32px;display:flex;align-items:center;gap:8px;border-radius:8px;padding:0 10px;
      font-size:12px;font-weight:600;color:#1e293b;cursor:pointer;
    }
    .template-item.active{background:#e3eefc;color:#0d4ea8}
    .workspace{
      position:relative;
      min-width:0;
      min-height:0;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,255,255,.9), transparent 34%),
        linear-gradient(180deg,#dbdce2,#d6d8df);
      display:flex;
      flex-direction:column;
    }
    .stage{
      position:relative;
      flex:1;
      min-height:0;
      padding:12px 18px 18px;
      display:flex;
      align-items:stretch;
      justify-content:center;
    }
    .canvas-card{
      width:min(1080px, 100%);
      flex:1;
      border-radius:16px;
      background:#fff;
      box-shadow:0 24px 64px rgba(29, 41, 69, .18);
      border:1px solid rgba(255,255,255,.75);
      padding:24px 24px 20px;
      position:relative;
      display:flex;
      flex-direction:column;
      min-height:0;
    }
    .canvas-title{
      display:flex;align-items:center;justify-content:space-between;
      padding-bottom:12px;border-bottom:1px solid #d8deea;margin-bottom:20px;
    }
    .dots{display:flex;gap:8px}.dot{width:10px;height:10px;border-radius:50%}
    .dot.r{background:#d91d1d}.dot.o{background:#d16b09}.dot.b{background:#4448e6}
    .canvas-title span{font-size:10px;letter-spacing:.22em;color:#64748b;font-weight:700}
    .phone-stage{
      position:relative;
      border-radius:12px;
      background:#efefef;
      flex:1;
      min-height:460px;
      padding:16px;
      overflow:hidden;
      --toolbar-dragging: 0;
    }
    .phone-screen{
      position:absolute;
      left:16px;
      right:16px;
      top:16px;
      height:62px;
      border-radius:2px;
      background:#f0f0f0;
      box-shadow:0 2px 10px rgba(0,0,0,.10);
      border:1px solid rgba(0,0,0,.03);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 18px;
      pointer-events:none;
    }
    .phone-screen .left, .phone-screen .right{font-weight:700;color:#2c2c2c;font-size:16px}
    .phone-icons{display:flex;align-items:center;gap:6px;color:#2d2d2d}
    .network-label{
      font-size:10px;
      font-weight:800;
      letter-spacing:.02em;
      color:#2c2c2c;
      opacity:.92;
      transform:translateY(-1px);
      min-width:22px;
    }
    .sig{display:flex;align-items:flex-end;gap:2px;height:16px}
    .sig span{width:2px;border-radius:2px;background:currentColor;display:block}
    .sig span:nth-child(1){height:6px}.sig span:nth-child(2){height:9px}.sig span:nth-child(3){height:12px}.sig span:nth-child(4){height:15px}
    .sim-cluster .sig{
      transform:scale(var(--sim-scale, 1));
      transform-origin:left center;
      margin-left:1px;
    }
    .wifi{
      width:18px;
      height:18px;
      display:block;
      transform:translateY(-1px);
      flex:0 0 auto;
    }
    .wifi path{
      stroke:currentColor;
      fill:none;
      stroke-width:1.9;
      stroke-linecap:round;
      stroke-linejoin:round;
      opacity:.22;
    }
    .wifi path.active{opacity:1}
    .wifi circle{fill:currentColor; opacity:1}
    .battery{
      width:34px;
      height:18px;
      border:2px solid currentColor;
      border-radius:5px;
      position:relative;
      padding:1px 2px 1px 2px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      overflow:visible;
      box-sizing:border-box;
    }
    .battery::after{
      content:"";
      position:absolute;
      right:-5px;
      top:50%;
      transform:translateY(-50%);
      width:3px;
      height:8px;
      background:currentColor;
      border-radius:2px;
    }
    .battery-fill{
      height:100%;
      width:67%;
      background:currentColor;
      border-radius:2px;
      flex:0 0 auto;
    }
    .battery-number{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:10px;
      font-weight:800;
      line-height:1;
      color:currentColor;
      pointer-events:none;
      text-shadow:0 0 1px rgba(255,255,255,.15);
    }
    .drag-layer{position:absolute;inset:0}
    .drag-item{
      position:absolute;
      top:96px;
      left:50%;
      transform:translateX(-50%);
      width:min(92%, calc(100% - 32px));
      border-radius:0;
      overflow:hidden;
      background:#fff;
      border:1px solid rgba(255,255,255,.8);
      box-shadow:0 18px 36px rgba(20,30,52,.14);
      cursor:grab;
      user-select:none;
      touch-action:none;
    }
    .drag-item.active{outline:2px solid rgba(23,100,212,.22)}
    .drag-item img{display:block;width:100%;height:auto;pointer-events:none}
    .nav-overlay{
      position:absolute;
      top:var(--toolbar-top, 12px);
      left:0;
      right:0;
      height:var(--toolbar-height, 62px);
      border-radius:0;
      background:transparent;
      box-shadow:none;
      border:0;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 18px;
      pointer-events:auto;
      cursor:grab;
      z-index:3;
      opacity:var(--toolbar-opacity, 1);
      --time-font-size: 16px;
      --time-x: 0px;
      --time-y: 0px;
      --wifi-preview-scale: 1;
      --sim1-scale: 1;
      --sim2-scale: 1;
      --battery-scale: 1;
    }
    .toolbar-fill{
      position:absolute;
      inset:0;
      pointer-events:none;
      background:linear-gradient(90deg, var(--toolbar-color, #ededed) 0%, var(--toolbar-color, #ededed) 25%, rgba(237,237,237,0) 50%, rgba(237,237,237,0) 100%);
      z-index:0;
    }
    .nav-overlay.dragging{cursor:grabbing}
    .nav-left{
      z-index:1;
      position:absolute;
      left:var(--time-x, 0px);
      top:var(--time-y, 0px);
      font-weight:700;
      color:#2c2c2c;
      font-size:var(--time-font-size);
      letter-spacing:-0.02em;
      cursor:grab;
      user-select:none;
      touch-action:none;
    }
    .nav-left.dragging{cursor:grabbing}
    .time-display{font-family:var(--time-font, 'Inter');}
    .time-display{color:var(--time-color, #2c2c2c);}
    .nav-right{
      z-index:1;
      display:flex;
      align-items:center;
      gap:9px;
      color:var(--icon-color, #2d2d2d);
      margin-left:auto;
      transform:scale(1.5);
      transform-origin:right center;
    }
    .sim-cluster{
      display:flex;
      align-items:center;
      gap:3px;
      color:var(--icon-color, #2d2d2d);
    }
    .sim-badge{
      font-size:calc(8px * var(--sim-scale, 1));
      font-weight:900;
      letter-spacing:-.04em;
      transform:translateY(-1px);
      line-height:1;
    }
    .wifi-mini{
      width:18px;
      height:18px;
      display:block;
      transform:translateY(-1px);
      flex:0 0 auto;
    }
    .wifi-mini path{
      stroke:currentColor;
      fill:none;
      stroke-width:1.9;
      stroke-linecap:round;
      stroke-linejoin:round;
      opacity:.95;
    }
    .wifi-mini circle{fill:currentColor}
    .wifi-preview{
      width:calc(42px * var(--wifi-preview-scale));
      height:calc(42px * var(--wifi-preview-scale));
      display:block;
      color:currentColor;
      flex:0 0 auto;
    }
    .wifi-mini.variant-1 path{stroke-width:2.1}
    .wifi-mini.variant-2{width:30px;height:30px}
    .wifi-mini.variant-2 path{stroke-width:1.65}
    .battery-text{
      font-size:calc(11px * var(--battery-scale));
      font-weight:800;
      letter-spacing:-.01em;
      transform:translateY(-1px);
      display:flex;
      align-items:center;
      gap:2px;
      white-space:nowrap;
    }
    .battery-text .bolt{font-size:calc(12px * var(--battery-scale)); line-height:1;}
    .color-control{
      display:flex;
      align-items:center;
      gap:8px;
      margin-top:10px;
      margin-bottom:8px;
    }
    .toolbar-color-row{
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:8px;
    }
    .color-swatch{
      width:38px;
      height:28px;
      padding:0;
      border:1px solid #d6dbe8;
      border-radius:8px;
      background:#fff;
      cursor:pointer;
    }
    .eyedropper-btn{
      height:28px;
      padding:0 10px;
      border:1px solid #d6dbe8;
      border-radius:8px;
      background:#fff;
      color:#334155;
      cursor:pointer;
      font-size:12px;
      font-weight:700;
    }
    .time-pos-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:10px;
    }
    .drag-hint{
      position:absolute;
      left:18px;
      bottom:12px;
      padding:4px 8px;
      border-radius:999px;
      background:rgba(255,255,255,.78);
      border:1px solid rgba(26,36,64,.08);
      font-size:11px;
      color:#475569;
      font-weight:700;
    }
    .statusbar{
      position:absolute;
      left:22px;
      bottom:16px;
      display:flex;
      gap:8px;
      align-items:center;
      font-size:11px;
      color:#6b7280;
      z-index:2;
    }
    .status-chip{
      background:rgba(255,255,255,.76);
      border:1px solid rgba(0,0,0,.06);
      border-radius:6px;
      padding:2px 8px;
      font-weight:700;
    }
    .tool-slot{
      border:1px dashed rgba(23,100,212,.25);
      background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(243,248,255,.88));
      border-radius:12px;
      padding:12px;
      margin-top:12px;
    }
    .tool-slot button{
      width:100%;
      height:38px;
      border:0;
      border-radius:10px;
      background:linear-gradient(135deg,#0058bc,#0b63e6);
      color:#fff;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 8px 18px rgba(23,100,212,.20);
    }
    .toolbar-panel{
      margin-top:12px;
      display:none;
      gap:10px;
      flex-direction:column;
    }
    .toolbar-panel.open{display:flex;}
    .toolbar-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-size:12px;
      font-weight:700;
      color:#334155;
    }
    .toolbar-slider{
      width:100%;
    }
    .font-select{
      width:100%;
      border:1px solid #dfe5f1;
      background:#fbfcff;
      border-radius:8px;
      padding:8px 10px;
      font:inherit;
      font-size:12px;
      outline:none;
    }
    .properties-group{
      margin-bottom:14px;padding:10px;border:1px solid rgba(15,23,42,.06);background:#fff;border-radius:10px;
    }
    .toolbar-height-input{
      width:72px;
      border:1px solid #dfe5f1;
      background:#fbfcff;
      border-radius:8px;
      padding:6px 8px;
      font:inherit;
      font-size:12px;
      outline:none;
      text-align:center;
    }
    .row{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .small-input{
      width:100%;border:1px solid #dfe5f1;background:#fbfcff;border-radius:8px;padding:8px 10px;font:inherit;font-size:12px;outline:none;
    }
    .time-icon{
      width:18px;
      height:18px;
      display:block;
      flex:0 0 auto;
      color:#64748b;
    }
    .range{width:100%}
    .footer-note{padding:12px 10px 0;font-size:11px;color:#8a93a5;text-align:center}
    .material-symbols-outlined{font-size:18px;line-height:1;vertical-align:middle;font-variation-settings:'FILL' 0,'wght' 500,'GRAD' 0,'opsz' 24}
    @media (max-width: 980px){
      body{overflow:auto}
      .shell{height:auto;min-height:100vh}
      .content{grid-template-columns:1fr}
      .sidebar,.properties{border:0;border-top:1px solid var(--line)}
      .workspace{min-height:580px}
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-badge"><span class="material-symbols-outlined">phone_iphone</span></div>
        <span>Status Studio</span>
      </div>
      <nav class="menu">
        <span>File</span><span>Edit</span><span>View</span><span>Help</span>
      </nav>
      <div class="actions">
        <button class="btn btn-primary" id="exportBtn"><span class="material-symbols-outlined">download</span> Export Assets</button>
      </div>
    </header>

    <div class="content">
      <aside class="sidebar">
        <div class="head"><span></span><span></span></div>
        <div class="body">
          <div class="section-title">ASSETS</div>
          <label class="asset-upload" for="imageInput" style="min-height:88px;">
            <div>
              <span class="material-symbols-outlined">upload_file</span>
              <small>点击或拖拽多张图片到这里</small>
            </div>
          </label>
          <input id="imageInput" type="file" accept="image/*" multiple hidden />
          <div class="tray-item" id="sampleImageCard" style="cursor:pointer;margin:10px 0;">
            <img class="tray-thumb" src="./sample-meeting.jpg" alt="示例图片">
            <div class="tray-meta">示例图片</div>
          </div>
          <div class="asset-list" id="assetList"></div>
        </div>
      </aside>

      <section class="workspace">
        <div class="stage">
          <div class="canvas-card">
            <div class="canvas-title">
              <div class="dots"><span class="dot r"></span><span class="dot o"></span><span class="dot b"></span></div>
              <span>SYSTEM PRECISION CANVAS</span>
              <div></div>
            </div>
            <div class="phone-stage" id="phoneStage">
            <div class="drag-layer" id="dragLayer"></div>
              <div class="drag-hint">拖动图片，靠近顶部会自动吸附</div>
            </div>
          </div>
        </div>
      </section>

      <aside class="properties">
        <div class="head">
          <span>Properties</span>
          <span class="material-symbols-outlined" style="font-size:18px;color:#64748b;">tune</span>
        </div>
        <div class="body">
          <div class="section-title" style="margin-top:0;">TIME</div>
          <div class="properties-group">
            <div class="row" style="margin-bottom:8px;">
              <div style="font-size:12px;font-weight:700;">Toolbar Opacity</div>
              <span class="value-tag" id="toolbarOpacityLabel">100%</span>
            </div>
            <input id="toolbarOpacityInput" class="range" type="range" min="0" max="100" value="100" />
          </div>
          <div class="color-control">
            <div>
              <div style="font-size:12px;font-weight:700;">Toolbar Color</div>
              <div style="font-size:11px;color:#64748b;">吸管读取工具条颜色</div>
            </div>
            <input id="toolbarColorInput" class="color-swatch" type="color" value="#ededed" />
            <button id="toolbarEyeDropperBtn" class="eyedropper-btn" type="button">吸管</button>
          </div>
          <div class="toolbar-color-row">
            <div style="font-size:12px;font-weight:700;">Time Color</div>
            <input id="timeColorInput" class="color-swatch" type="color" value="#2c2c2c" />
            <button id="timeEyeDropperBtn" class="eyedropper-btn" type="button">吸管</button>
          </div>
          <div class="properties-group">
            <div class="row">
              <div class="row" style="gap:6px;justify-content:flex-start;">
                <img class="time-icon" src="./clock.svg" alt="" aria-hidden="true" />
                <div style="font-size:12px;font-weight:700;">Time Value</div>
              </div>
              <input id="timeInput" class="small-input" style="max-width:80px;text-align:center;padding:8px 12px;" value="20:39" />
            </div>
            <div class="row" style="margin-top:10px;margin-bottom:8px;">
              <div style="font-size:12px;font-weight:700;">Time Font Size</div>
              <span class="value-tag" id="timeSizeLabel">26px</span>
            </div>
            <input id="timeSizeInput" class="range" type="range" min="18" max="40" value="26" />
            <div class="row" style="margin-top:10px;margin-bottom:8px;">
              <div style="font-size:12px;font-weight:700;">Time Position</div>
              <span class="value-tag" id="timePosLabel">0, 0</span>
            </div>
            <div class="time-pos-grid">
              <input id="timeXInput" class="small-input" type="number" value="0" />
              <input id="timeYInput" class="small-input" type="number" value="0" />
            </div>
            <div style="margin-top:10px;">
              <div class="row" style="margin-bottom:8px;">
                <div style="font-size:12px;font-weight:700;">UI Font</div>
                <span class="value-tag" id="fontLabel">Inter</span>
              </div>
              <select id="fontSelect" class="font-select">
                <option value="'Inter', sans-serif">Inter</option>
                <option value="'Roboto', sans-serif">Roboto</option>
                <option value="'Source Sans 3', sans-serif">Source Sans 3</option>
                <option value="'Manrope', sans-serif">Manrope</option>
                <option value="'Noto Sans SC', sans-serif">Noto Sans SC</option>
              </select>
            </div>
          </div>
          <button class="btn btn-primary" id="resetBtn" style="width:100%;height:38px;margin-top:2px;">Reset to Defaults</button>
        </div>
      </aside>
    </div>
  </div>

  <script>
    const defaults = {
      fontFamily: "'Inter', sans-serif",
      time: '20:39',
      timeSize: 26,
      timeX: 0,
      timeY: 0,
      toolbarOpacity: 100,
      toolbarColor: '#ededed',
      timeColor: '#2c2c2c',
      width: 1170,
      height: 140
    };

    const STORAGE_KEY = 'status-studio-state-v1';

    const state = {
      ...defaults,
      images: [],
      activeImageId: null
    };
    let toolbarShiftPreview = false;

    const el = {
      phoneStage: document.getElementById('phoneStage'),
      dragLayer: document.getElementById('dragLayer'),
      fontSelect: document.getElementById('fontSelect'),
      fontLabel: document.getElementById('fontLabel'),
      toolbarOpacityInput: document.getElementById('toolbarOpacityInput'),
      toolbarOpacityLabel: document.getElementById('toolbarOpacityLabel'),
      toolbarColorInput: document.getElementById('toolbarColorInput'),
      toolbarEyeDropperBtn: document.getElementById('toolbarEyeDropperBtn'),
      timeColorInput: document.getElementById('timeColorInput'),
      timeEyeDropperBtn: document.getElementById('timeEyeDropperBtn'),
      timeInput: document.getElementById('timeInput'),
      timeSizeInput: document.getElementById('timeSizeInput'),
      timeSizeLabel: document.getElementById('timeSizeLabel'),
      timeXInput: document.getElementById('timeXInput'),
      timeYInput: document.getElementById('timeYInput'),
      timePosLabel: document.getElementById('timePosLabel'),
      exportBtn: document.getElementById('exportBtn'),
      resetBtn: document.getElementById('resetBtn'),
      imageInput: document.getElementById('imageInput'),
      assetList: document.getElementById('assetList'),
      sampleImageCard: document.getElementById('sampleImageCard')
      };

    const phoneW = 1170;

    function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }
    function fmtCoord(n) { return Number(n || 0).toFixed(3); }

    function saveState() {
      const payload = {
        fontFamily: state.fontFamily,
        time: state.time,
        timeSize: state.timeSize,
        timeX: state.timeX,
        timeY: state.timeY,
        toolbarOpacity: state.toolbarOpacity,
        toolbarColor: state.toolbarColor,
        timeColor: state.timeColor,
        width: state.width,
        height: state.height,
        images: state.images.map(item => ({
          id: item.id,
          name: item.name,
          yPx: item.yPx,
          width: item.width,
          sourceType: item.sourceType || 'url',
          source: item.source || item.url
        }))
      };
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      } catch (_) {}
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const saved = JSON.parse(raw);
        Object.assign(state, saved);
        restoreImages(saved.images);
      } catch (_) {}
    }

    function applyStateToInputs() {
      el.fontSelect.value = state.fontFamily || defaults.fontFamily;
      if (el.toolbarOpacityInput) el.toolbarOpacityInput.value = state.toolbarOpacity ?? defaults.toolbarOpacity;
      if (el.toolbarColorInput) el.toolbarColorInput.value = state.toolbarColor || defaults.toolbarColor;
      if (el.timeColorInput) el.timeColorInput.value = state.timeColor || defaults.timeColor;
      el.timeInput.value = state.time || defaults.time;
      if (el.timeSizeInput) el.timeSizeInput.value = state.timeSize ?? defaults.timeSize;
      state.timeX = Number(state.timeX ?? defaults.timeX);
      state.timeY = Number(state.timeY ?? defaults.timeY);
      if (el.timeXInput) el.timeXInput.value = fmtCoord(state.timeX);
      if (el.timeYInput) el.timeYInput.value = fmtCoord(state.timeY);
    }

    function restoreImages(savedImages) {
      if (!Array.isArray(savedImages)) return;
      state.images = savedImages.map(item => ({
        id: item.id || crypto.randomUUID(),
        name: item.name || '图片',
        yPx: typeof item.yPx === 'number' ? item.yPx : undefined,
        width: item.width || 720,
        sourceType: item.sourceType || 'url',
        source: item.source || item.url || './sample-meeting.jpg',
        url: item.source || item.url || './sample-meeting.jpg'
      }));
      if (state.images.length) state.activeImageId = state.images[0].id;
    }
    function syncLabels(persist = true) {
      const fontFamily = state.fontFamily || defaults.fontFamily;
      const timeSize = clamp(state.timeSize ?? defaults.timeSize, 18, 30);
      const toolbarOpacity = toolbarShiftPreview ? 50 : clamp(state.toolbarOpacity ?? defaults.toolbarOpacity, 0, 100);
      const toolbarColor = state.toolbarColor || defaults.toolbarColor;
      const timeColor = state.timeColor || defaults.timeColor;
      if (el.fontLabel) el.fontLabel.textContent = (el.fontSelect?.selectedOptions?.[0]?.textContent) || 'Inter';
      if (el.toolbarOpacityLabel) el.toolbarOpacityLabel.textContent = `${toolbarOpacity}%`;
      if (el.timeSizeLabel) el.timeSizeLabel.textContent = `${timeSize}px`;
      if (el.timePosLabel) el.timePosLabel.textContent = `${fmtCoord(state.timeX ?? defaults.timeX)}, ${fmtCoord(state.timeY ?? defaults.timeY)}`;
      if (el.timeColorInput) el.timeColorInput.value = timeColor;
      document.documentElement.style.setProperty('--time-font', fontFamily);
      document.documentElement.style.setProperty('--time-font-size', `${timeSize}px`);
      document.documentElement.style.setProperty('--time-color', timeColor);
      document.documentElement.style.setProperty('--toolbar-opacity', `${toolbarOpacity / 100}`);
      document.documentElement.style.setProperty('--toolbar-color', toolbarColor);
      if (el.fontSelect) el.fontSelect.value = fontFamily;
      if (el.toolbarOpacityInput) el.toolbarOpacityInput.value = toolbarOpacity;
      if (el.toolbarColorInput) el.toolbarColorInput.value = toolbarColor;
      if (el.timeSizeInput) el.timeSizeInput.value = timeSize;
      if (el.timeXInput) el.timeXInput.value = fmtCoord(state.timeX ?? defaults.timeX);
      if (el.timeYInput) el.timeYInput.value = fmtCoord(state.timeY ?? defaults.timeY);
      if (persist) saveState();
    }

    function currentToolbarOpacity() {
      return toolbarShiftPreview ? 50 : clamp(state.toolbarOpacity ?? defaults.toolbarOpacity, 0, 100);
    }

    function syncInputs() {
      state.time = el.timeInput.value || defaults.time;
      state.timeSize = clamp(Number(el.timeSizeInput?.value ?? defaults.timeSize), 18, 30);
      state.timeX = Number(state.timeX ?? defaults.timeX);
      state.timeY = Number(state.timeY ?? defaults.timeY);
      state.toolbarOpacity = clamp(Number(el.toolbarOpacityInput?.value ?? defaults.toolbarOpacity), 0, 100);
      state.toolbarColor = el.toolbarColorInput?.value || state.toolbarColor || defaults.toolbarColor;
      state.timeColor = el.timeColorInput?.value || state.timeColor || defaults.timeColor;
      state.timeX = Number(el.timeXInput?.value ?? state.timeX ?? defaults.timeX);
      state.timeY = Number(el.timeYInput?.value ?? state.timeY ?? defaults.timeY);
      state.fontFamily = el.fontSelect?.value || defaults.fontFamily;
    }

    function renderSidebarAssets() {
      el.assetList.innerHTML = '';
      const active = state.images.find(item => item.id === state.activeImageId) || state.images[0];
      if (!state.activeImageId) state.activeImageId = active.id;
      state.images.forEach(item => {
        const card = document.createElement('div');
        card.className = 'tray-item' + (item.id === state.activeImageId ? ' active' : '');
        card.innerHTML = `
          <img class="tray-thumb" src="${item.url}" alt="">
          <div class="tray-meta">${item.name}</div>
        `;
        card.addEventListener('click', () => {
          state.activeImageId = item.id;
          renderSidebarAssets();
          renderDragLayer();
        });
        el.assetList.appendChild(card);
      });
    }

    function renderDragLayer() {
      el.dragLayer.innerHTML = '';
      if (!state.images.length) {
        el.dragLayer.innerHTML = '';
        return;
      }
      state.images.forEach(active => {
        const item = document.createElement('div');
        item.className = 'drag-item' + (active.id === state.activeImageId ? ' active' : '');
        item.dataset.id = active.id;
        item.style.width = `${active.width || 720}px`;
        item.style.left = `${(el.phoneStage.clientWidth - (active.width || 720)) / 2}px`;
        item.style.top = `${active.yPx ?? 0}px`;
        item.style.transform = 'none';
        item.style.pointerEvents = 'auto';
        item.innerHTML = `
          <div class="nav-overlay" style="--time-font-size:${clamp(state.timeSize ?? defaults.timeSize, 18, 40)}px; --toolbar-opacity:${currentToolbarOpacity() / 100}; --toolbar-color:${state.toolbarColor || defaults.toolbarColor}; --time-color:${state.timeColor || defaults.timeColor}; --time-x:${Number(state.timeX ?? defaults.timeX)}px; --time-y:${Number(state.timeY ?? defaults.timeY)}px;">
            <div class="toolbar-fill"></div>
            <div class="nav-left time-display" id="timeBlock">${state.time}</div>
          </div>
          <img src="${active.url}" alt="">
        `;
        el.dragLayer.appendChild(item);
        const timeBlock = item.querySelector('.nav-left');
        timeBlock.style.left = `${Number(state.timeX ?? defaults.timeX)}px`;
        timeBlock.style.top = `${Number(state.timeY ?? defaults.timeY)}px`;

        const down = e => {
          state.draggingId = active.id;
          const stageRect = el.phoneStage.getBoundingClientRect();
          const imgRect = item.getBoundingClientRect();
          state.dragOffsetY = e.clientY - imgRect.top;
          active.yPx = imgRect.top - stageRect.top;
          item.setPointerCapture?.(e.pointerId);
          e.preventDefault();
        };
        const move = e => {
          if (state.draggingId !== active.id) return;
          const stageRect = el.phoneStage.getBoundingClientRect();
          const h = item.offsetHeight;
          let top = e.clientY - stageRect.top - state.dragOffsetY;
          top = clamp(top, 0, stageRect.height - h);
          active.yPx = top;
          item.style.top = `${top}px`;
          item.style.left = `${(stageRect.width - item.offsetWidth) / 2}px`;
          item.style.transform = 'none';
        };
        const up = e => {
          if (state.draggingId !== active.id) return;
          state.draggingId = null;
          try { item.releasePointerCapture?.(e.pointerId); } catch (_) {}
        };
        const wheel = e => {
          e.preventDefault();
          const delta = e.deltaY;
          const next = clamp((active.yPx ?? 0) + delta * 0.7, 0, el.phoneStage.clientHeight - item.offsetHeight);
          active.yPx = next;
          item.style.top = `${next}px`;
          item.style.left = `${(el.phoneStage.clientWidth - item.offsetWidth) / 2}px`;
          item.style.transform = 'none';
        };
        item.addEventListener('pointerdown', down);
        item.addEventListener('pointermove', move);
        item.addEventListener('pointerup', up);
        item.addEventListener('pointercancel', up);
        item.addEventListener('wheel', wheel, { passive: false });

        const timeDrag = { active: false, startX: 0, startY: 0, originX: 0, originY: 0 };
        const timeDown = e => {
          timeDrag.active = true;
          timeDrag.startX = e.clientX;
          timeDrag.startY = e.clientY;
          timeDrag.originX = Number(state.timeX ?? defaults.timeX);
          timeDrag.originY = Number(state.timeY ?? defaults.timeY);
          timeBlock.classList.add('dragging');
          timeBlock.setPointerCapture?.(e.pointerId);
          e.preventDefault();
          e.stopPropagation();
        };
        const timeMove = e => {
          if (!timeDrag.active) return;
          const factor = e.shiftKey ? 0.1 : 1;
          const nextX = clamp(timeDrag.originX + (e.clientX - timeDrag.startX) * factor, -200, 200);
          const nextY = clamp(timeDrag.originY + (e.clientY - timeDrag.startY) * factor, -80, 80);
          timeBlock.style.left = `${nextX}px`;
          timeBlock.style.top = `${nextY}px`;
          state.timeX = nextX;
          state.timeY = nextY;
        };
        const timeUp = e => {
          if (!timeDrag.active) return;
          timeDrag.active = false;
          timeBlock.classList.remove('dragging');
          try { timeBlock.releasePointerCapture?.(e.pointerId); } catch (_) {}
          saveState();
        };
        timeBlock.addEventListener('pointerdown', timeDown);
        timeBlock.addEventListener('pointermove', timeMove);
        timeBlock.addEventListener('pointerup', timeUp);
        timeBlock.addEventListener('pointercancel', timeUp);
      });
    }

    function renderAll() {
      syncInputs();
      syncLabels();
      renderSidebarAssets();
      renderDragLayer();
    }

    function resetDefaults() {
      Object.assign(state, defaults);
      state.images = [];
      state.activeImageId = null;
      el.fontSelect.value = defaults.fontFamily;
      if (el.toolbarOpacityInput) el.toolbarOpacityInput.value = defaults.toolbarOpacity;
      if (el.toolbarColorInput) el.toolbarColorInput.value = defaults.toolbarColor;
      if (el.timeColorInput) el.timeColorInput.value = defaults.timeColor;
      el.timeInput.value = defaults.time;
      if (el.timeSizeInput) el.timeSizeInput.value = defaults.timeSize;
      if (el.timeXInput) el.timeXInput.value = defaults.timeX;
      if (el.timeYInput) el.timeYInput.value = defaults.timeY;
      state.timeX = defaults.timeX;
      state.timeY = defaults.timeY;
      state.toolbarOpacity = defaults.toolbarOpacity;
      state.toolbarColor = defaults.toolbarColor;
      state.timeColor = defaults.timeColor;
      toolbarShiftPreview = false;
      renderAll();
    }

    function exportPNG() {
      const a = document.createElement('a');
      a.download = `status-bar-${state.width}x${state.height}.png`;
      const active = state.images.find(item => item.id === state.activeImageId);
      a.href = active?.url || 'data:,';
      a.click();
    }

    function addImages(files) {
      for (const file of files) {
        if (!file.type.startsWith('image/')) continue;
        const url = URL.createObjectURL(file);
        state.images.unshift({
          id: crypto.randomUUID(),
          name: file.name,
          url,
          yPx: 0,
          width: 720
        });
      }
      if (state.images.length && !state.activeImageId) state.activeImageId = state.images[0].id;
      renderAll();
    }

    function loadSampleImage() {
      const url = './sample-meeting.jpg';
      const existing = state.images.find(item => item.url === url || item.name === '示例图片');
      if (existing) {
        state.activeImageId = existing.id;
      } else {
        state.images.unshift({
          id: crypto.randomUUID(),
          name: '示例图片',
          url,
          yPx: 0,
          width: 720
        });
        state.activeImageId = state.images[0].id;
      }
      renderAll();
    }

    function handleFileDrop(files) {
      addImages([...files || []]);
    }

    [
      el.fontSelect,
      el.toolbarOpacityInput,
      el.toolbarColorInput,
      el.timeColorInput,
      el.timeInput,
      el.timeSizeInput,
      el.timeXInput,
      el.timeYInput,
    ].forEach(input => input.addEventListener('input', () => {
      renderAll();
    }));

    el.toolbarEyeDropperBtn?.addEventListener('click', async () => {
      if (!window.EyeDropper) return;
      try {
        const picker = new EyeDropper();
        const result = await picker.open();
        if (result?.sRGBHex) {
          state.toolbarColor = result.sRGBHex;
          if (el.toolbarColorInput) el.toolbarColorInput.value = result.sRGBHex;
          document.documentElement.style.setProperty('--toolbar-color', result.sRGBHex);
          renderAll();
        }
      } catch (_) {}
    });

    el.timeEyeDropperBtn?.addEventListener('click', async () => {
      if (!window.EyeDropper) return;
      try {
        const picker = new EyeDropper();
        const result = await picker.open();
        if (result?.sRGBHex) {
          state.timeColor = result.sRGBHex;
          if (el.timeColorInput) el.timeColorInput.value = result.sRGBHex;
          document.documentElement.style.setProperty('--time-color', result.sRGBHex);
          renderAll();
        }
      } catch (_) {}
    });

    const applyToolbarShiftPreview = enabled => {
      toolbarShiftPreview = enabled;
      syncLabels(false);
      renderDragLayer();
    };

    window.addEventListener('keydown', e => {
      if (e.key === 'Shift' && !toolbarShiftPreview) {
        applyToolbarShiftPreview(true);
      }
    });

    window.addEventListener('keyup', e => {
      if (e.key === 'Shift' && toolbarShiftPreview) {
        applyToolbarShiftPreview(false);
      }
    });
    window.addEventListener('blur', () => {
      if (toolbarShiftPreview) applyToolbarShiftPreview(false);
    });

    el.imageInput.addEventListener('change', () => {
      addImages([...el.imageInput.files || []]);
      el.imageInput.value = '';
    });
    el.sampleImageCard?.addEventListener('click', loadSampleImage);
    ['dragenter', 'dragover'].forEach(type => {
      el.phoneStage.addEventListener(type, e => {
        e.preventDefault();
        e.stopPropagation();
      });
    });
    el.phoneStage.addEventListener('drop', e => {
      e.preventDefault();
      e.stopPropagation();
      handleFileDrop(e.dataTransfer?.files);
    });
    ['dragenter', 'dragover'].forEach(type => {
      document.querySelector('.asset-upload')?.addEventListener(type, e => {
        e.preventDefault();
        e.stopPropagation();
      });
    });
    document.querySelector('.asset-upload')?.addEventListener('drop', e => {
      e.preventDefault();
      e.stopPropagation();
      handleFileDrop(e.dataTransfer?.files);
    });
    el.exportBtn.addEventListener('click', exportPNG);
    el.resetBtn.addEventListener('click', resetDefaults);

    window.addEventListener('resize', renderDragLayer);
    window.addEventListener('load', () => {
      loadState();
      applyStateToInputs();
      loadSampleImage();
      renderAll();
    });
    renderAll();
  </script>
</body>
</html>
